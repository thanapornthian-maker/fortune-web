<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:black;overflow:hidden}
#app{position:fixed;inset:0}
video,img{position:absolute;width:100%;height:100%;object-fit:cover}
img{display:none}
</style>
</head>
<body>

<div id="app">
  <video id="video" playsinline muted></video>
  <img id="image">
</div>

<script>
const video=document.getElementById("video");
const image=document.getElementById("image");

const clip="https://res.cloudinary.com/dkg0rb4wf/video/upload/copy_E7563CFE-E06A-4D33-85CC-88419C25948B_sqkhrb.mp4";

const images=[
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299536/IMG_4102_buakaw.png",
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299536/IMG_4104_j8dlkh.png",
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299537/IMG_4103_itjyqg.png",
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299539/IMG_4101_lgxy96.png",
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299540/IMG_4100_otf02l.png",
"https://res.cloudinary.com/dkg0rb4wf/image/upload/v1772299535/IMG_4105_fclrg9.png"
];

let state="video";

window.addEventListener("load",()=>{
 video.src=clip;
 video.play().catch(()=>{});
});

video.addEventListener("ended",goFortune);

document.body.addEventListener("click",()=>{
 if(state==="video") goFortune();
 else reset();
});

function goFortune(){
 video.pause();
 video.style.display="none";
 const rand=Math.floor(Math.random()*images.length);
 image.src=images[rand];
 image.style.display="block";
 state="fortune";
}

function reset(){
 image.style.display="none";
 video.style.display="block";
 video.currentTime=0;
 video.play().catch(()=>{});
 state="video";
}
</script>

</body>
</html>
